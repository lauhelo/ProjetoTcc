<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Animal - Entre Laços</title>
    <link rel="stylesheet" href="atuAnimal.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo">
                <img src="logo.png" alt="logo" height="40">
                <span>Entre Laços</span>
            </div>
            <nav class="menu-links">
                <a href="index.html">Início</a>
                <a href="animais.html">Animais</a>
                <a href="doar.html">Doar</a>
                <a href="eventos.html">Eventos</a>
                <a href="historias.html">Histórias</a>
                <a href="dicas.html">Dicas</a>
            </nav>
            <a href="animais.html" class="botao-voltar">Voltar</a>
        </div>
    </header>

    <main class="principal">
        <div class="titulo-secao">
            <h2>Atualizar Animal</h2>
            <p id="subtitulo-passo">Edite as informações do pet abaixo</p>
        </div>
        
    
        <form id="formAtualizar">
            <div class="form-container-flex">

                <div class="form-box">
                    <h3>Informações do Pet</h3>

                    <label>Nome do Animal</label>
                    <input type="text" name="nome" id="inputNome" required>

                    <label>Espécie</label>
                    <select name="especie" id="inputEspecie" required>
                        <option value="cachorro">Cachorro</option>
                        <option value="gato">Gato</option>
                        <option value="outro">Outro</option>
                    </select>

                    <label>Raça</label>
                    <input type="text" name="raca" id="inputRaca" required>

                    <label>Sexo</label>
                    <select name="sexo" id="inputSexo" required>
                        <option value="macho">Macho</option>
                        <option value="fêmea">Fêmea</option>
                    </select>

                    <label>Porte</label>
                    <select name="porte" id="inputPorte" required>
                        <option value="pequeno">Pequeno</option>
                        <option value="medio">Médio</option>
                        <option value="grande">Grande</option>
                    </select>

                    <label>Idade Aproximada</label>
                    <input type="text" name="idade" id="inputIdade" required>

                    <label>Descrição / História</label>
                    <textarea name="descricao" id="inputDescricao" required></textarea>

                    <label>Status Atual</label>
                    <select name="status" id="selectStatus" required>
                        <option value="">Selecione o status</option>
                        <option value="Disponível">Disponível</option>
                        <option value="Em Adoção">Em Processo de Adoção</option>
                        <option value="Adotado">Adotado</option>
                        <option value="Urgente">Urgente (Lar Temporário)</option>
                    </select>

                    <label>Alterar Foto (deixe vazio para manter a atual)</label>
                    <input type="file" id="inputFoto" accept="image/*">

                    <div class="form-acoes">
                        <button type="submit" class="btn">Salvar Alterações</button>
                        <a href="animais.html" class="btn-cancelar">Voltar para a Lista</a>
                    </div>
                </div>
                
        <div class="conteudo-imagem">
            <img src="https://i.pinimg.com/736x/0d/12/22/0d1222299fdca39826941f5f3215bc5c.jpg" alt="Pet feliz">
        </div>

        </form>
        
          
        
    </main>

    <script>
        const formAtualizar = document.getElementById("formAtualizar");
        const urlParams = new URLSearchParams(window.location.search);
        const idAnimal = urlParams.get('id');

        // 1. CARREGAR DADOS ATUAIS
        document.addEventListener("DOMContentLoaded", async () => {
            if (!idAnimal) {
                console.error("ID do animal não encontrado na URL.");
                return;
            }

            try {
                const token = localStorage.getItem("token");
                const res = await fetch(`http://localhost:3000/animal/${idAnimal}`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (res.ok) {
                    const pet = await res.json();
                    // Preenchimento automático dos campos
                    if (formAtualizar.nome) formAtualizar.nome.value = pet.nome || "";
                    if (formAtualizar.especie) formAtualizar.especie.value = pet.especie || "cachorro";
                    if (formAtualizar.raca) formAtualizar.raca.value = pet.raca || "";
                    if (formAtualizar.sexo) formAtualizar.sexo.value = pet.sexo || "macho";
                    if (formAtualizar.porte) formAtualizar.porte.value = pet.porte || "medio";
                    if (formAtualizar.idade) formAtualizar.idade.value = pet.idade || "";
                    if (formAtualizar.descricao) formAtualizar.descricao.value = pet.descricao || "";
                    if (formAtualizar.status) formAtualizar.status.value = pet.status || "";
                } else {
                    console.warn("Não foi possível pré-carregar os dados. Verifique se o ID existe no banco.");
                }
            } catch (err) {
                console.error("Erro na requisição GET:", err);
            }
        });

        // 2. FUNÇÃO AUXILIAR PARA IMAGEM
        const converterParaBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = (error) => reject(error);
            });
        };

        // 3. ENVIO DOS DADOS (PUT)
        formAtualizar.addEventListener("submit", async function (e) {
            e.preventDefault();

            const token = localStorage.getItem("token");
            const inputFoto = document.getElementById("inputFoto");
            const fotoArquivo = inputFoto.files[0];

            let fotoBase64 = "";
            if (fotoArquivo) {
                fotoBase64 = await converterParaBase64(fotoArquivo);
            }

            const formData = new FormData(this);
            const dadosAtualizados = {
                nome: formData.get("nome"),
                especie: formData.get("especie"),
                raca: formData.get("raca"),
                porte: formData.get("porte"),
                idade: formData.get("idade"),
                sexo: formData.get("sexo"),
                descricao: formData.get("descricao"),
                status: formData.get("status"),
                imagem: fotoBase64
            };

            try {
                const resposta = await fetch(`http://localhost:3000/atualizarAnimal/${idAnimal}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(dadosAtualizados)
                });

                const resultado = await resposta.json();

                if (resposta.ok) {
                    alert("Animal atualizado com sucesso!");
                    window.location.href = "animais.html";
                } else {
                    alert("Erro: " + (resultado.erro || "Falha ao atualizar"));
                }
            } catch (err) {
                console.error("ERRO NO SUBMIT:", err);
                alert("Erro de conexão com o servidor.");
            }
        });
    </script>
</body>

</html>
