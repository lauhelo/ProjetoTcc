<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Entre laços</title>
    <link rel="stylesheet" href="acesso.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo">
                <img src="logo.png" alt="logo" height="40">
                <span>Entre laços</span>
            </div>

            <nav class="menu-links">
                <a href="index.html">Início</a>
                <a href="animais.html">Animais</a>
                <a href="doar.html">Doar</a>
                <a href="eventos.html">Eventos</a>
                <a href="historias.html">Histórias</a>
                <a href="dicas.html">Dicas</a>
            </nav>

            <div class="perfil-topo">
                <a class="botao-voltar" href="index.html">Voltar ao Início</a>
            </div>
        </div>
    </header>

    <section class="secao-acesso">
        <div class="container-acesso">

            <div class="card-acesso">
                <h2>Criar conta</h2>
                <p>Faça parte da nossa rede de proteção animal</p>

                <form id="formCadastro">
                    <input id="nome" type="text" placeholder="Nome completo" required>
                    <input id="email" type="email" placeholder="E-mail" required>
                    <input id="cep" type="text" placeholder="Endereço" required>
                    <input id="cpf" type="text" placeholder="CPF" required>
                    <input id="telefone" type="text" placeholder="Telefone" required>
                    <input id="data_nascimento" type="date" required>
                    <input id="senha" type="password" placeholder="Senha" required>

                    <button type="submit" class="botao-principal">Cadastrar</button>
                </form>

                <span class="link-alternar">
                    Já tem conta? <a href="acesso.html">Entrar</a>
                </span>
            </div>

            <div class="conteudo-imagem">
                <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a" alt="Cachorro">
            </div>

        </div>
    </section>

    <script>
        document.getElementById("formCadastro").addEventListener("submit", async function (e) {
            e.preventDefault()

            const dados = {
                nome: document.getElementById("nome").value,
                email: document.getElementById("email").value,
                cep: document.getElementById("cep").value,
                cpf: document.getElementById("cpf").value,
                telefone: document.getElementById("telefone").value,
                data_nascimento: document.getElementById("data_nascimento").value,
                senha: document.getElementById("senha").value
            }

            try {
                const resposta = await fetch("http://localhost:3000/inserir", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    }, body: JSON.stringify(dados)
                })

                const resultado = await resposta.json()
                alert(resultado.resposta)
                window.location.href = "acesso.html"

            } catch (erro) {
                console.log(erro)
                alert("Erro ao conectar com o servidor")
            }
        })
    </script>

</body>

</html>
