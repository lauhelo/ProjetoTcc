<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro - Entre laços</title>
    <link rel="stylesheet" href="acesso.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo">
                <img src="logo.png" height="40">
                <span>Entre laços</span>
            </div>

            <nav class="menu-links">
                <a href="index.html">Início</a>
                <a href="animais.html">Animais</a>
                <a href="doar.html">Doar</a>
                <a href="eventos.html">Eventos</a>
                <a href="historias.html">Histórias</a>
                <a href="dicas.html">Dicas</a>
            </nav>

            <div class="perfil-topo">
                <a class="botao-voltar" href="index.html">Voltar</a>
            </div>
        </div>
    </header>

    <section class="secao-acesso">
        <div class="container-acesso">
            <div class="card-acesso">
                <h2>Criar conta</h2>
                <p>Faça parte da nossa rede de proteção animal</p>

                <form id="formCadastro">
                    <input id="nome" type="text" placeholder="Nome completo" maxlength="100" required>
                    
                    <input id="email" type="email" placeholder="E-mail" maxlength="100" required>

                    <select id="tipo_usuario" required onchange="toggleCamposOng()">
                        <option value="" disabled selected>Você é Usuário ou ONG?</option>
                        <option value="usuario">Quero Adotar (Usuário)</option>
                        <option value="ong">Sou uma ONG / Protetor</option>
                    </select>

                    <div id="campos-ong" style="display: none; width: 100%;">
                        <input id="cnpj" type="text" placeholder="CNPJ da ONG" maxlength="18">
                        <p style="font-size: 12px; color: #e67e22; margin-bottom: 10px;">
                            * Como ONG, após este cadastro você completará o perfil da instituição.
                        </p>
                    </div>

                    <input id="cep" type="text" placeholder="CEP" maxlength="9" required>
                    
                    <input id="cpf" type="text" placeholder="CPF" maxlength="14" required>
                    
                    <input id="telefone" type="text" placeholder="Telefone" maxlength="15" required>
                    
                    <input id="data_nascimento" type="date" required>
                
                    <input id="senha" type="password" placeholder="Senha" maxlength="50" required>
                    
                    <div style="margin: 10px 0; padding: 10px; border: 1px dashed #e89c59; border-radius: 5px;">
                        <label style="font-size: 12px; display: block; margin-bottom: 5px; color: #555;">Sua palavra de segurança (usada para recuperar a conta):</label>
                        <input id="palavra_chave" type="text" placeholder="Ex: Nome do seu primeiro pet" maxlength="50" required>
                    </div>

                    <button type="submit" class="botao-principal">Finalizar Cadastro</button>
                </form>

                <span class="link-alternar">
                    Já tem conta? <a href="acesso.html">Entrar</a>
                </span>
            </div>

            <div class="conteudo-imagem">
                <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a" alt="Cachorro">
            </div>
        </div>
    </section>
    <script>
        // Alterna a visibilidade dos campos extras de ONG
        function toggleCamposOng() {
            const tipo = document.getElementById("tipo_usuario").value;
            const div = document.getElementById("campos-ong");
            div.style.display = tipo === "ong" ? "block" : "none";
        }
    
        // --- MÁSCARAS ---
        document.getElementById("cpf").addEventListener("input", function (e) {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            e.target.value = v;
        });
    
        document.getElementById("telefone").addEventListener("input", function (e) {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d{5})(\d)/, "$1-$2");
            e.target.value = v;
        });
    
        document.getElementById("cep").addEventListener("input", function (e) {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/(\d{5})(\d)/, "$1-$2");
            e.target.value = v;
        });
    
        document.getElementById("cnpj").addEventListener("input", function (e) {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/, "$1.$2");
            v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
            v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
            v = v.replace(/(\d{4})(\d)/, "$1-$2");
            e.target.value = v;
        });
    
        // --- ENVIO DO FORMULÁRIO ---
        document.getElementById("formCadastro").addEventListener("submit", async function (e) {
            e.preventDefault();
    
            const tipoUsuario = document.getElementById("tipo_usuario").value;
            
            // Reunindo dados e limpando caracteres especiais das máscaras
            const dados = {
                nome: document.getElementById("nome").value,
                email: document.getElementById("email").value,
                tipo: tipoUsuario, 
                cep: document.getElementById("cep").value.replace(/\D/g, ""),
                cpf: document.getElementById("cpf").value.replace(/\D/g, ""),
                telefone: document.getElementById("telefone").value.replace(/\D/g, ""),
                data_nascimento: document.getElementById("data_nascimento").value,
                palavra_chave: document.getElementById("palavra_chave").value,
                senha: document.getElementById("senha").value
            };
    
            try {
                const resposta = await fetch("http://localhost:3000/inserir", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dados)
                });
    
                const resultado = await resposta.json();
    
                if (resposta.ok) {
                    // Salva informações básicas na sessão para uso imediato
                    sessionStorage.setItem("nome", dados.nome);
                    localStorage.setItem("tipoUsuario", tipoUsuario);
    
                    if (tipoUsuario === "ong") {
                        // Se for ONG, já logamos o usuário (salvando token) e mandamos para o perfil da ONG
                        localStorage.setItem("token", resultado.token);
                        alert("Dados pessoais salvos! Agora, complete o perfil da sua instituição.");
                        window.location.href = "ong.html";
                    } else {
                        // Se for usuário comum, ele vai para a tela de login
                        alert("Cadastro realizado com sucesso! Faça login para continuar.");
                        window.location.href = "acesso.html";
                    }
                } else {
                    alert(resultado.erro || "Erro ao cadastrar. Verifique os dados.");
                }
            } catch (error) {
                console.error("Erro na requisição:", error);
                alert("Erro na conexão com o servidor. O backend está ligado?");
            }
        });
    </script>
</body>
</html>
