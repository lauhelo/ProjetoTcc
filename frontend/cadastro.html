<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha de ONGs - Entre Laços</title>
    <link rel="stylesheet" href="escolherOng.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body onload="carregarOngs()">
    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo"><span>Entre laços</span></div>
            <nav class="menu-links">
                <a href="index.html">Início</a>
            </nav>
            <div class="perfil-topo">
                <a class="botao-principal" href="index.html">Sair</a>
            </div>
        </div>
    </header>

    <main class="container-escolha">
        <h2>Suas Instituições</h2>
        <div id="listaOngs"><p>Carregando instituições...</p></div>
        <button class="btn-novo" onclick="window.location.href='ong.html'">+ Cadastrar Nova ONG</button>
    </main>

    <script>
        async function carregarOngs() {
            const token = localStorage.getItem("token");
            if (!token) { window.location.href = "acesso.html"; return; }

            try {
                const res = await fetch("http://localhost:3000/minhas-ongs", {
                    headers: { "Authorization": "Bearer " + token }
                });
                const ongs = await res.json();
                const container = document.getElementById("listaOngs");

                if (ongs.length === 0) {
                    container.innerHTML = "<p>Nenhuma ONG cadastrada.</p>";
                    return;
                }

                container.innerHTML = ongs.map(ong => `
                    <div class="card-ong">
                        <div class="info-ong">
                            <h3>${ong.nome}</h3>
                            <p>📍 ${ong.cidade || '---'}</p>
                            <div class="acoes-admin">
                                <button class="btn-editar" onclick="window.location.href='ong.html?edit=${ong.id_ong}'">✏️ Editar</button>
                                <button class="btn-excluir" onclick="excluirOng('${ong.id_ong}')">🗑️ Excluir</button>
                            </div>
                        </div>
                        <button class="btn-selecionar" onclick="selecionar('${ong.id_ong}', '${ong.nome}')">Gerenciar</button>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function excluirOng(id) {
            if (!confirm("Tem certeza que deseja excluir?")) return;
            const token = localStorage.getItem("token");
            try {
                const res = await fetch(`http://localhost:3000/deletarOng/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": "Bearer " + token }
                });
                if (res.ok) { alert("ONG excluída!"); carregarOngs(); }
            } catch (err) { alert("Erro ao excluir."); }
        }

        function selecionar(id, nome) {
            localStorage.setItem("idOngAtiva", id);
            localStorage.setItem("nomeOngAtiva", nome);
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
