<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animais - Entre Laços</title>
    <link rel="stylesheet" href="animais.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo">
                <img src="logo.png" alt="logo" height="40">
                <span>Entre laços</span>
            </div>
            <nav class="menu-links">
                <a class="ativo" href="index.html">Início</a>
                <a href="animais.html">Animais</a>
                <a href="doar.html">Doar</a>
                <a href="eventos.html">Eventos</a>
                <a href="historias.html">Histórias</a>
                <a href="dicas.html">Dicas</a>
            </nav>
            <div class="perfil-topo">
                <a class="botao-voltar" href="index.html">Voltar ao Início</a>
            </div>
        </div>
    </header>

    <main class="principal">
        <div class="titulo-secao">
            <h2>Encontre seu novo amiguinho!</h2>
            <p>Filtre por espécie, porte ou sexo para encontrar o pet ideal para você.</p>

            <div id="area-admin-ong" style="display: none; margin-top: 20px;">

                <button class="botao-principal" onclick="window.location.href='cadAnimal.html'" ...>

                    <button class="botao-principal" onclick="window.location.href='cadAnimal.html'" style="background-color: #e67e22; padding: 12px 25px; border-radius: 8px; 
                        color: white; border: none; cursor: pointer; font-weight: bold;">
                        ➕ Cadastrar Novo Animal
                    </button>
            </div>
        </div>

        <div class="container-adocao">
            <aside class="filtros-lateral">
                <h3>🔻 Filtros</h3>
                <div class="secao-filtro">
                    <p>Espécie</p>
                    <div class="tags-filtro">
                        <button class="btn-filtro active" onclick="setFiltro(this, 'especie', '')">🐾 Todos</button>
                        <button class="btn-filtro" onclick="setFiltro(this, 'especie', 'cachorro')">🐶 Cães</button>
                        <button class="btn-filtro" onclick="setFiltro(this, 'especie', 'gato')">🐱 Gatos</button>
                    </div>
                </div>

                <div class="secao-filtro">
                    <p>Porte</p>
                    <select id="filtroPorte" onchange="carregarAnimais()">
                        <option value="">Todos os tamanhos</option>
                        <option value="pequeno">Pequeno</option>
                        <option value="medio">Médio</option>
                        <option value="grande">Grande</option>
                    </select>
                </div>

                <div class="secao-filtro">
                    <p>Sexo</p>
                    <div class="tags-filtro">
                        <button class="btn-filtro active" onclick="setFiltro(this, 'sexo', '')">Todos</button>
                        <button class="btn-filtro" onclick="setFiltro(this, 'sexo', 'fêmea')">Fêmeas</button>
                        <button class="btn-filtro" onclick="setFiltro(this, 'sexo', 'macho')">Machos</button>
                    </div>
                </div>
            </aside>

            <section id="lista-pets" class="grid-pets"></section>
        </div>
    </main>

    <script>
        let filtros = { especie: "", sexo: "", porte: "" };
    
        function verificarPermissaoOng() {
            const idOngAtiva = localStorage.getItem("idOngAtiva");
            const areaAdmin = document.getElementById("area-admin-ong");
    
            if (areaAdmin) {
                // Verifica se idOngAtiva existe e não é a string "null" ou "undefined"
                if (idOngAtiva && idOngAtiva !== "null" && idOngAtiva !== "undefined") {
                    areaAdmin.style.display = "block";
                } else {
                    areaAdmin.style.display = "none";
                }
            }
        }
    
        function setFiltro(btn, tipo, valor) {
            filtros[tipo] = valor;
            const parent = btn.parentElement;
            parent.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            carregarAnimais();
        }
    
        async function carregarAnimais() {
            const lista = document.getElementById("lista-pets");
            const token = localStorage.getItem('token');
            const idOngLogada = localStorage.getItem("idOngAtiva");
    
            if (!token) {
                alert("Você precisa estar logado para ver os animais.");
                window.location.href = "acesso.html";
                return;
            }
    
            const selectPorte = document.getElementById("filtroPorte");
            if (selectPorte) filtros.porte = selectPorte.value;
    
            lista.innerHTML = "<p>Carregando animais...</p>";
    
            // Criando a URL de forma segura
            const params = new URLSearchParams({
                especie: filtros.especie || "",
                sexo: filtros.sexo || "",
                porte: filtros.porte || ""
            });
    
            const url = `http://localhost:3000/mostrarAnimal?${params.toString()}`;
    
            try {
                const res = await fetch(url, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
    
                if (res.status === 401 || res.status === 403) {
                    window.location.href = "acesso.html";
                    return;
                }
    
                const dados = await res.json();
                lista.innerHTML = ""; // Limpa o "Carregando..."
    
                if (!dados || dados.length === 0) {
                    lista.innerHTML = `<div class="aviso-vazio"><p>Nenhum pet encontrado com esses filtros. 🐾</p></div>`;
                    return;
                }
    
                // Gerando o HTML de forma mais robusta
                let conteudoHTML = "";
                dados.forEach(pet => {
                    const ehDono = idOngLogada && parseInt(idOngLogada) === pet.id_ong;
                    
                    // Verifique se no banco o campo é 'imagem' ou 'foto'
                    const fotoExibir = pet.imagem || 'placeholder.jpg';
    
                    conteudoHTML += `
                    <div class="card-pet">
                        <div class="card-img" style="background-image: url('${fotoExibir}')">
                            <span class="badge-sexo">${pet.sexo || ''}</span>
                            ${ehDono ? `
                                <div class="acoes-admin">
                                    <button class="btn-icone editar" onclick="window.location.href='atuAnimal.html?id=${pet.id_animal}'" title="Editar">✏️</button>
                                    <button class="btn-icone excluir" onclick="excluirAnimal(${pet.id_animal})" title="Excluir">🗑️</button>
                                </div>
                            ` : ''}
                        </div>
                        <div class="card-info">
                            <h3>${pet.nome}</h3>
                            <p class="raca">${pet.raca}</p>
                            <div class="mini-tags">
                                <span>${pet.porte}</span>
                                <span>${pet.idade}</span>
                            </div>
                            <button class="btn-conhecer" onclick="ver(${pet.id_animal})">Conhecer</button>
                        </div>
                    </div>`;
                });
                
                lista.innerHTML = conteudoHTML;
    
            } catch (erro) {
                console.error("Erro ao carregar:", erro);
                lista.innerHTML = "<p>Erro ao conectar com o servidor. Verifique se o banco está rodando.</p>";
            }
        }
    
        async function excluirAnimal(id) {
            if (!confirm("Tem certeza que deseja excluir permanentemente este cadastro?")) return;
    
            const token = localStorage.getItem("token");
    
            try {
                const res = await fetch(`http://localhost:3000/excluirAnimal/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const dados = await res.json();
    
                if (res.ok) {
                    alert("Animal removido com sucesso!");
                    carregarAnimais(); 
                } else {
                    alert("Erro: " + (dados.erro || "Não foi possível excluir."));
                }
            } catch (err) {
                alert("Erro de conexão.");
            }
        }
    
        function ver(id) {
            if(!id) return;
            window.location.href = "animal.html?id=" + id;
        }
    
        document.addEventListener("DOMContentLoaded", () => {
            verificarPermissaoOng();
            carregarAnimais();
        });
    </script>
</body>

</html>
