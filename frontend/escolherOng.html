<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha de ONGs - Entre Laços</title>
    <link rel="stylesheet" href="escolherOng.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body onload="carregarOngs()">

    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo">
                <img src="logo.png" alt="logo" height="35">
                <span>Entre laços</span>
            </div>

            <nav class="menu-links">
                <a href="index.html" onclick="return verificarNavegacao(event)">Início</a>
                <a href="animais.html" onclick="return verificarNavegacao(event)">Animais</a>
                <a href="doar.html" onclick="return verificarNavegacao(event)">Doar</a>
                <a href="eventos.html" onclick="return verificarNavegacao(event)">Eventos</a>
                <a href="historias.html" onclick="return verificarNavegacao(event)">Histórias</a>
                <a href="dicas.html" onclick="return verificarNavegacao(event)">Dicas</a>
            </nav>

            <div class="perfil-topo">
                <a class="botao-principal" href="index.html" onclick="return verificarNavegacao(event)">Voltar ao
                    Início</a>
            </div>
        </div>
    </header>

    <main class="container-escolha">
        <h2>Suas Instituições</h2>
        <p>Você precisa selecionar uma ONG para gerenciar antes de continuar.</p>

        <div id="listaOngs">
            <p>Buscando suas ONGs...</p>
        </div>

        <button class="btn-novo" onclick="window.location.href='ong.html'">
            + Cadastrar Nova ONG
        </button>
    </main>

    <script>
        function verificarNavegacao(event) {
            const tipoUsuario = localStorage.getItem("tipoUsuario");
            const ongAtiva = localStorage.getItem("idOngAtiva");

            if (tipoUsuario === "ong" && (!ongAtiva || ongAtiva === "null")) {
                event.preventDefault();
                alert("Acesso Bloqueado: Selecione uma ONG na lista abaixo para poder gerenciar o sistema.");
                return false;
            }
            return true;
        }

        async function carregarOngs() {
            localStorage.removeItem("idOngAtiva");
            localStorage.removeItem("nomeOngAtiva");

            const token = localStorage.getItem("token");

            if (!token) {
                alert("Sessão expirada. Faça login novamente.");
                window.location.href = "acesso.html";
                return;
            }

            try {
                const res = await fetch("http://localhost:3000/minhas-ongs", {
                    method: "GET",
                    headers: { "Authorization": "Bearer " + token }
                });

                if (!res.ok) throw new Error("Erro ao carregar");

                const ongs = await res.json();
                const container = document.getElementById("listaOngs");

                if (ongs.length === 0) {
                    container.innerHTML = `
                        <p style='margin: 20px 0; color: #888;'>Nenhuma ONG vinculada à sua conta.</p>
                        <p style='font-size: 14px;'>Clique no botão abaixo para cadastrar sua primeira instituição.</p>
                    `;
                    return;
                }

                container.innerHTML = ongs.map(ong => `
    <div class="card-ong">
        <div class="info-ong">
            <h3>${ong.nome}</h3>
            <p>📍 ${ong.cidade || 'Cidade'} - ${ong.estado || 'UF'}</p>
            <p><small>CNPJ: ${ong.cnpj || 'Não informado'}</small></p>
            
            <div class="acoes-admin">
              
<button class="btn-editar" onclick="window.location.href='atuOng.html?id=' + '${ong.id_ong}'">
    ✏️ Editar
</button>
                <button class="btn-excluir" onclick="deletarOng('${ong.id_ong}')">
                    🗑️ Excluir
                </button>
            </div>
        </div>

        <button class="btn-selecionar" onclick="selecionarOng('${ong.id_ong}', '${ong.nome}')">
            Gerenciar
        </button>
    </div>
`).join('');

            } catch (err) {
                console.error(err);
                document.getElementById("listaOngs").innerHTML = "<p style='color: red;'>Erro ao conectar com o servidor. Tente novamente mais tarde.</p>";
            }
        }

        function selecionarOng(id, nome) {
            localStorage.setItem("idOngAtiva", id);
            localStorage.setItem("nomeOngAtiva", nome);
            window.location.href = "index.html";
        }
        async function deletarOng(id) {
            if (!confirm("Tem certeza que deseja excluir esta ONG permanentemente?")) return;

            const token = localStorage.getItem("token");
            try {
                const res = await fetch(`http://localhost:3000/deletarOng/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (res.ok) {
                    alert("ONG removida com sucesso!");
                    carregarOngs();
                } else {
                    alert("Erro ao excluir a instituição.");
                }
            } catch (err) {
                console.error(err);
                alert("Erro de conexão.");
            }
        }
    </script>
</body>

</html>
