<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Animal - Entre Laços</title>
    <link rel="stylesheet" href="animal.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo">
                <img src="logo.png" alt="logo" height="40">
                <span>Entre Laços</span>
            </div>
            <nav class="menu-links">
                <a href="index.html">Início</a>
                <a class="ativo" href="animais.html">Animais</a>
                <a href="doar.html">Doar</a>
                <a href="eventos.html">Eventos</a>
                <a href="historias.html">Histórias</a>
                <a href="dicas.html">Dicas</a>
            </nav>
            <div class="perfil-topo">
                <a class="botao-voltar" href="javascript:history.back()">Voltar</a>
            </div>
        </div>
    </header>

    <main class="principal-detalhes">
        <div id="carregando" class="msg-carregando">
            Carregando informações do amiguinho...
        </div>

        <div id="container-animal" class="container-detalhes-animal" style="display: none;">
            <div class="conteudo-detalhes">
                <div class="coluna-foto">
                    <img id="animal-foto" src="" alt="Foto do Animal" class="foto-animal-detalhe">
                </div>

                <div class="info-animal-detalhe">
                    <div id="animal-status" class="status-badge-grande"></div>
                    <h1 id="animal-nome"></h1>
                    
                    <div class="detalhes-lista">
                        <div class="item-detalhe"><strong>Espécie</strong> <span id="animal-especie"></span></div>
                        <div class="item-detalhe"><strong>Sexo</strong> <span id="animal-sexo"></span></div>
                        <div class="item-detalhe"><strong>Raça</strong> <span id="animal-raca"></span></div>
                        <div class="item-detalhe"><strong>Porte</strong> <span id="animal-porte"></span></div>
                        <div class="item-detalhe"><strong>Idade/Anos</strong> <span id="animal-idade"></span></div>
                        <div class="item-detalhe"><strong>Localização</strong> <span id="animal-local"></span></div>
                    </div>

                    <h3>Minha História</h3>
                    <p id="animal-descricao" class="descricao-longa"></p>

                    <div class="ong-contato-card">
                        <h4>Instituição Responsável</h4>
                        <p><strong>Nome:</strong> <span id="animal-ong-nome"></span></p>
                        <p><strong>📍 Endereço:</strong> <span id="animal-ong-local"></span></p>
                        <p><strong>📞 Telefone:</strong> <span id="animal-ong-tel"></span></p>
                        <p class="pix-box"><strong>💰 Chave PIX:</strong> <span id="animal-ong-pix"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function carregarDetalhesAnimal() {
            const urlParams = new URLSearchParams(window.location.search);
            const idAnimal = urlParams.get('id');
            const token = localStorage.getItem('token');

            if (!idAnimal) {
                window.location.href = 'animais.html';
                return;
            }

            try {
                const response = await fetch(`http://localhost:3000/animais?id=${idAnimal}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error("Erro ao buscar dados");
                const animal = await response.json();
                
                // Log para debug: veja no console do navegador se os dados da ONG aparecem aqui
                console.log("Dados recebidos:", animal);

                // Dados do Animal
                document.getElementById('animal-foto').src = animal.imagem || 'placeholder.png';
                document.getElementById('animal-nome').innerText = animal.nome;
                document.getElementById('animal-especie').innerText = animal.especie;
                document.getElementById('animal-sexo').innerText = animal.sexo;
                document.getElementById('animal-raca').innerText = animal.raca || "SRD";
                document.getElementById('animal-porte').innerText = animal.porte;
                document.getElementById('animal-idade').innerText = animal.idade;
                document.getElementById('animal-local').innerText = `${animal.cidade} - ${animal.estado}`;
                document.getElementById('animal-descricao').innerText = animal.descricao;

                // Dados da ONG - Ajustados para bater com os campos da tabela ONG
                document.getElementById('animal-ong-nome').innerText = animal.ong_nome || animal.nome_ong || "ONG Parceira";
                document.getElementById('animal-ong-local').innerText = animal.endereco || "Endereço não informado";
                document.getElementById('animal-ong-tel').innerText = animal.telefone || "Telefone não informado";
                document.getElementById('animal-ong-pix').innerText = animal.pix || "Não informado";

                // Status e Cor
                const statusElement = document.getElementById('animal-status');
                statusElement.innerText = animal.status;
                const s = animal.status.toLowerCase();
                if (s.includes('dispon')) statusElement.style.backgroundColor = '#27ae60';
                else if (s.includes('processo')) statusElement.style.backgroundColor = '#f39c12';
                else statusElement.style.backgroundColor = '#2980b9';

                document.getElementById('carregando').style.display = 'none';
                document.getElementById('container-animal').style.display = 'block';

            } catch (error) {
                console.error(error);
                alert("Erro ao carregar detalhes.");
            }
        }
        window.onload = carregarDetalhesAnimal;
    </script>
</body>
</html>
